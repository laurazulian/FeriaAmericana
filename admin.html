<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Mi Feria Americana</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- PANTALLA DE LOGIN -->
<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <div class="login-icon">🔒</div>
    <h2>Panel de administración</h2>
    <p>Ingresá tu contraseña para gestionar el catálogo</p>
    <div class="field">
      <label for="passwordInput">Contraseña</label>
      <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <p class="login-error hidden" id="loginError">Contraseña incorrecta</p>
    <button class="btn-save" id="btnLogin">Entrar</button>
    <a href="index.html" class="login-back">← Ver catálogo público</a>
  </div>
</div>

<!-- PANEL ADMIN (oculto hasta login) -->
<div id="adminPanel" class="hidden">

  <header>
    <div class="badge">⚙️ Panel Admin</div>
    <h1>Mi <em>Closet</em></h1>
    <p>Ropa con historia, a precios que no duelen</p>
    <div class="header-links">
      <a href="index.html" class="header-link">Ver catálogo público →</a>
      <button class="header-link btn-logout" id="btnLogout">Cerrar sesión</button>
    </div>
  </header>

  <div class="toolbar">
    <div class="filter-group" id="filterGroup">
      <button class="filter-btn active" data-filter="todas">Todas</button>
      <button class="filter-btn" data-filter="disponible">Disponibles</button>
      <button class="filter-btn" data-filter="reservado">Reservadas</button>
      <button class="filter-btn" data-filter="vendido">Vendidas</button>
    </div>
    <span class="count-badge" id="countBadge">0 prendas</span>
    <button class="btn-add" id="btnAdd">
      <span>＋</span> Agregar prenda
    </button>
  </div>

  <div class="catalog-grid" id="catalogGrid"></div>

  <!-- MODAL AGREGAR / EDITAR -->
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Nueva prenda</h2>
        <button class="btn-close" id="btnClose">✕</button>
      </div>
      <div class="modal-body">

        <div class="upload-zone" id="uploadZone">
          <div class="upload-label">
            <span>🖼️</span>
            <p>Hacé clic o arrastrá una foto</p>
          </div>
          <input type="file" id="fileInput" accept="image/*" />
        </div>

        <div class="field">
          <label for="fNombre">Nombre / descripción</label>
          <input type="text" id="fNombre" placeholder="Ej: Campera de jean vintage" />
        </div>

        <div class="fields-row">
          <div class="field">
            <label for="fCategoria">Categoría</label>
            <select id="fCategoria">
              <option value="Tops">Tops</option>
              <option value="Pantalones">Pantalones</option>
              <option value="Vestidos">Vestidos</option>
              <option value="Camperas">Camperas</option>
              <option value="Calzado">Calzado</option>
              <option value="Accesorios">Accesorios</option>
              <option value="Otro">Otro</option>
            </select>
          </div>
          <div class="field">
            <label for="fTalle">Talle</label>
            <input type="text" id="fTalle" placeholder="XS / S / M / 38…" />
          </div>
        </div>

        <div class="fields-row">
          <div class="field">
            <label for="fPrecio">Precio ($)</label>
            <input type="number" id="fPrecio" placeholder="0" min="0" />
          </div>
          <div class="field">
            <label for="fEstado">Estado</label>
            <select id="fEstado">
              <option value="disponible">Disponible</option>
              <option value="reservado">Reservado</option>
              <option value="vendido">Vendido</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label for="fNota">Nota (opcional)</label>
          <textarea id="fNota" placeholder="Condición, detalles, etc."></textarea>
        </div>

        <button class="btn-save" id="btnSave">Guardar prenda</button>
      </div>
    </div>
  </div>

  <!-- LIGHTBOX -->
  <div class="lightbox hidden" id="lightbox">
    <img id="lightboxImg" src="" alt="Foto ampliada" />
  </div>

</div><!-- /adminPanel -->

<script src="admin.js"></script>
</body>
</html>
